<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NoteLogger Test</title>
    <style>
        body {
            font-family: monospace;
            padding: 20px;
            background-color: #1e1e1e;
            color: #d4d4d4;
        }
        h1 { color: #4ec9b0; }
        button {
            padding: 10px 16px;
            margin: 6px;
            background-color: #0e639c;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-family: monospace;
        }
        button:hover { background-color: #1177bb; }
        button.stop-btn {
            background-color: #d16969;
        }
        button.stop-btn:hover { background-color: #e08888; }
        #output {
            margin-top: 12px;
            padding: 12px;
            background-color: #252526;
            border: 1px solid #3e3e42;
            border-radius: 4px;
            white-space: pre-wrap;
            max-height: 400px;
            overflow-y: auto;
            font-size: 12px;
        }
    </style>
    <script type="module" src="/test/notelogger-test.js"></script>
</head>
<body>
    <h1>NoteLogger Test</h1>
    <p>Interactive test: Start a session, play notes on your keyboard, then stop to see the logged data with metadata.</p>

    <button id="basicTest">Start Session</button>
    <button id="multipleEventsTest" class="stop-btn">Stop Session</button>
    <button id="sessionMetadataTest">Reset</button>
    <button id="clearOutput">Clear Output</button>

    <div id="output">Waiting for tests...</div>
</body>
</html>
