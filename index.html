<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Learn blues improvisation through colorful, interactive musical scales">
    <title>ColorImprov — Learn Blues Improvisation</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/src/styles.css">
    <script type="module" src="/src/main.js"></script>
</head>
<body>
    <div id="app">
        <div id="top-panel">
            <div id="volume-controls">
                <div class="volume-group">
                    <label for="backing-track-volume">Backing Track: </label>
                    <input type="range" id="backing-track-volume" min="0" max="1" step="0.01" value="0">
                    <div style="display: flex; flex-direction: column; align-items: center;">
                        <button id="backing-track-mute-btn" class="volume-btn" aria-label="Mute backing track"><i class="fas fa-volume-xmark"></i></button>
                        <span class="btn-label volume-btn-label">Mute</span>
                    </div>
                    <div style="display: flex; flex-direction: column; align-items: center;">
                        <button id="backing-track-reset-btn" class="volume-btn" type="button" aria-label="Reset backing track volume"><i class="fas fa-undo"></i></button>
                        <span class="btn-label volume-btn-label">Reset</span>
                    </div>
                </div>
                <div class="volume-group">
                    <label for="samples-volume">Trumpet: </label>
                    <input type="range" id="samples-volume" min="0" max="1" step="0.01" value="0">
                    <div style="display: flex; flex-direction: column; align-items: center;">
                        <button id="samples-mute-btn" class="volume-btn" aria-label="Mute trumpet"><i class="fas fa-volume-xmark"></i></button>
                        <span class="btn-label volume-btn-label">Mute</span>
                    </div>
                    <div style="display: flex; flex-direction: column; align-items: center;">
                        <button id="samples-reset-btn" class="volume-btn" type="button" aria-label="Reset trumpet volume"><i class="fas fa-undo"></i></button>
                        <span class="btn-label volume-btn-label">Reset</span>
                    </div>
                </div>
            </div>
            <div id="playback-controls">
                <div style="display: flex; flex-direction: column; align-items: center;">
                    <button id="play-btn" class="playback-btn" aria-label="Play" title="Play (Space)"><i class="fas fa-play"></i></button>
                    <span class="btn-label playback-btn-label">Play</span>
                </div>
                <div style="display: flex; flex-direction: column; align-items: center;">
                    <button id="pause-btn" class="playback-btn" aria-label="Pause" title="Pause (Space)"><i class="fas fa-pause"></i></button>
                    <span class="btn-label playback-btn-label">Pause</span>
                </div>
                <div style="display: flex; flex-direction: column; align-items: center;">
                    <button id="stop-btn" class="playback-btn stop" aria-label="Stop" title="Stop (Shift+Esc)"><i class="fas fa-stop"></i></button>
                    <span class="btn-label playback-btn-label">Stop</span>
                </div>
                <div style="display: flex; flex-direction: column; align-items: center;">
                    <button id="record-btn" class="playback-btn" aria-label="Record" title="Record (Shift+R)"><i class="fas fa-circle"></i></button>
                    <span id="record-btn-label" class="btn-label playback-btn-label">Record</span>
                </div>
            </div>
            <div id="instructions-and-settings">
                <div id="instructions" tabindex="0" aria-label="Instructions">Click for instructions and help.
                    <p>Let's get a feel for the 12-bar blues! <br>
                    Press keyboard keys from the appropriate row to play notes according to the current chord. <br>
                    <strong>Controls:</strong> <kbd>Space</kbd> to play/pause. <kbd>Shift</kbd>+<kbd>Esc</kbd> to stop (resets to beginning). <kbd>Shift</kbd>+<kbd>R</kbd> to record.
                    <button id="instructions-close-btn" aria-label="Close instructions">✕</button>
                    </p>
                </div>
                <label for="difficulty-select">Difficulty: </label>
                <select id="difficulty-select" aria-label="Select difficulty level...">
                    <option value="easy" selected>Easy (both helpers)</option>
                    <option value="medium">Medium (one helper)</option>
                    <option value="hard">Hard (no helpers)</option>
                </select>
            </div>
            <div id="error-message" role="alert" aria-live="assertive"></div>
        </div>
        <canvas id="mainCanvas" aria-label="Interactive musical grid"></canvas>
    </div>
</body>
</html>
