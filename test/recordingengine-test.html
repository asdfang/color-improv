<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RecordingEngine Test</title>
    <style>
        body {
            font-family: monospace;
            padding: 20px;
            background-color: #1e1e1e;
            color: #d4d4d4;
        }
        h1 { color: #4ec9b0; }
        button {
            padding: 10px 16px;
            margin: 6px;
            background-color: #0e639c;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-family: monospace;
        }
        button:hover { background-color: #1177bb; }
        #output {
            margin-top: 12px;
            padding: 12px;
            background-color: #252526;
            border: 1px solid #3e3e42;
            border-radius: 4px;
            white-space: pre-wrap;
            max-height: 320px;
            overflow-y: auto;
        }
        audio {
            margin-top: 10px;
            width: 100%;
        }
    </style>
    <script type="module" src="/test/recordingengine-test.js"></script>
</head>
<body>
    <h1>RecordingEngine Test</h1>
    <p>Use the tone generator to feed the recording. Stop to get a playback blob.</p>

    <button id="initAudio">Init Audio</button>
    <button id="toneOn">Tone On</button>
    <button id="toneOff">Tone Off</button>
    <button id="startRec">Start Recording</button>
    <button id="stopRec">Stop Recording</button>
    <button id="downloadRec">Download Last Recording</button>

    <audio id="playback" controls></audio>

    <div id="output">Waiting for tests...</div>
</body>
</html>
